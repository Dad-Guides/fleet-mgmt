<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Family Bike Shop — fleet management and maintenance tracking">
  <meta name="theme-color" content="#1e293b">
  <title>Family Bike Shop</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icons/icon-192.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icons/icon-192.svg">
  <link rel="stylesheet" href="/css/theme.css">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>

  <!-- Theme picker (hidden panel toggled by header button) -->
  <div id="theme-panel" class="theme-panel" role="dialog" aria-label="Choose theme" hidden>
    <div class="theme-panel-inner">
      <p class="theme-panel-label">Theme</p>
      <div class="theme-swatches">
        <button class="theme-swatch" data-theme="slate"   title="Slate"   aria-label="Slate theme"></button>
        <button class="theme-swatch" data-theme="zinc"    title="Zinc"    aria-label="Zinc theme"></button>
        <button class="theme-swatch" data-theme="forest"  title="Forest"  aria-label="Forest theme"></button>
        <button class="theme-swatch" data-theme="ocean"   title="Ocean"   aria-label="Ocean theme"></button>
        <button class="theme-swatch" data-theme="ember"   title="Ember"   aria-label="Ember theme"></button>
      </div>
      <p class="theme-panel-label" style="margin-top:0.75rem">Mode</p>
      <div class="theme-swatches">
        <button class="mode-btn" data-mode="system" aria-label="System default">System</button>
        <button class="mode-btn" data-mode="light"  aria-label="Light mode">Light</button>
        <button class="mode-btn" data-mode="dark"   aria-label="Dark mode">Dark</button>
      </div>
    </div>
  </div>

  <!-- Sidebar (desktop) -->
  <aside class="sidebar" role="navigation" aria-label="Main navigation">
    <div class="sidebar-header">
      <svg class="sidebar-logo" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="11" cy="26" r="7" stroke="currentColor" stroke-width="2.5"/>
        <circle cx="29" cy="26" r="7" stroke="currentColor" stroke-width="2.5"/>
        <polyline points="11,26 18,12 24,12 29,26" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/>
        <line x1="7" y1="12" x2="24" y2="12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="18" y1="12" x2="20" y2="8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <circle cx="20" cy="7" r="2" fill="var(--accent)"/>
      </svg>
      <span class="sidebar-title">Bike Shop</span>
      <button class="theme-toggle-btn" id="theme-toggle-btn-sidebar" aria-label="Open theme settings" title="Theme">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
        </svg>
      </button>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item" href="#/" data-route="dashboard" aria-label="Dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        <span>Fleet</span>
      </a>
      <a class="nav-item" href="#/log" data-route="log" aria-label="Maintenance Log">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        <span>Log</span>
      </a>
      <a class="nav-item" href="#/schedule" data-route="schedule" aria-label="Schedule">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>Schedule</span>
      </a>
      <a class="nav-item" href="#/parts" data-route="parts" aria-label="Parts">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 010 14.14M4.93 4.93a10 10 0 000 14.14"/><path d="M14.83 9.17a4 4 0 010 5.66M9.17 9.17a4 4 0 000 5.66"/></svg>
        <span>Parts</span>
      </a>
      <a class="nav-item" href="#/tools" data-route="tools" aria-label="Tools">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>
        <span>Tools</span>
      </a>
    </nav>
  </aside>

  <!-- App shell -->
  <div class="app-shell">

    <!-- Mobile header -->
    <header class="mobile-header">
      <svg class="mobile-logo" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="11" cy="26" r="7" stroke="currentColor" stroke-width="2.5"/>
        <circle cx="29" cy="26" r="7" stroke="currentColor" stroke-width="2.5"/>
        <polyline points="11,26 18,12 24,12 29,26" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/>
        <line x1="7" y1="12" x2="24" y2="12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="18" y1="12" x2="20" y2="8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <circle cx="20" cy="7" r="2" fill="var(--accent)"/>
      </svg>
      <span class="mobile-header-title">Bike Shop</span>
      <button class="theme-toggle-btn" id="theme-toggle-btn-mobile" aria-label="Open theme settings" title="Theme">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
        </svg>
      </button>
    </header>

    <!-- Main content -->
    <main id="app" class="main-content" role="main">
      <div class="loading-state">
        <div class="loading-spinner" aria-label="Loading…"></div>
        <p>Loading fleet data…</p>
      </div>
    </main>

    <!-- Bottom nav (mobile) -->
    <nav class="bottom-nav" role="navigation" aria-label="Main navigation">
      <a class="nav-item" href="#/" data-route="dashboard" aria-label="Fleet">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        <span>Fleet</span>
      </a>
      <a class="nav-item" href="#/log" data-route="log" aria-label="Log">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        <span>Log</span>
      </a>
      <a class="nav-item" href="#/schedule" data-route="schedule" aria-label="Schedule">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>Schedule</span>
      </a>
      <a class="nav-item" href="#/parts" data-route="parts" aria-label="Parts">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 010 14.14M4.93 4.93a10 10 0 000 14.14"/><path d="M14.83 9.17a4 4 0 010 5.66M9.17 9.17a4 4 0 000 5.66"/></svg>
        <span>Parts</span>
      </a>
      <a class="nav-item" href="#/tools" data-route="tools" aria-label="Tools">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>
        <span>Tools</span>
      </a>
    </nav>

  </div>

  <!-- Toast container -->
  <div id="toast-container" role="status" aria-live="polite" aria-atomic="true"></div>

  <!-- Modal container -->
  <div id="modal-container" role="dialog" aria-modal="true" hidden></div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
